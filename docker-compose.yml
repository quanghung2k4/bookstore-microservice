services:
  postgres:
    image: postgres:16-alpine
    container_name: bookstore-postgres
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-databases.sql:/docker-entrypoint-initdb.d/init-multiple-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookstore -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    networks:
      - bookstore-network
    restart: unless-stopped

  api-gateway:
    build: ./api_gateway
    container_name: api-gateway
    command: sh -c "python manage.py migrate && gunicorn --bind 0.0.0.0:8000 api_gateway.wsgi:application"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      book-service:
        condition: service_started
      cart-service:
        condition: service_started
      customer-service:
        condition: service_started
      order-service:
        condition: service_started
      comment-rate-service:
        condition: service_started
      recommender-ai-service:
        condition: service_started
    environment:
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: api_gateway_db
      DB_USER: bookstore
      DB_PASSWORD: bookstore
      BOOK_SERVICE_URL: http://book-service:8000
      CART_SERVICE_URL: http://cart-service:8000
      CUSTOMER_SERVICE_URL: http://customer-service:8000
      STAFF_SERVICE_URL: http://staff-service:8000
      MANAGER_SERVICE_URL: http://manager-service:8000
      CATALOG_SERVICE_URL: http://catalog-service:8000
      ORDER_SERVICE_URL: http://order-service:8000
      PAY_SERVICE_URL: http://pay-service:8000
      SHIP_SERVICE_URL: http://ship-service:8000
      COMMENT_RATE_SERVICE_URL: http://comment-rate-service:8000
      RECOMMENDER_AI_SERVICE_URL: http://recommender-ai-service:8000
    networks:
      - bookstore-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: bookstore-frontend
    depends_on:
      api-gateway:
        condition: service_started
    environment:
      VITE_API_PROXY_TARGET: http://api-gateway:8000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    networks:
      - bookstore-network
    restart: unless-stopped

  book-service:
    build: ./book_service
    container_name: book-service
    command: sh -c "python manage.py migrate && gunicorn --bind 0.0.0.0:8000 book_service.wsgi:application"
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: book_service_db
      DB_USER: bookstore
      DB_PASSWORD: bookstore
    networks:
      - bookstore-network
    restart: unless-stopped

  cart-service:
    build: ./cart_service
    container_name: cart-service
    command: sh -c "python manage.py migrate && gunicorn --bind 0.0.0.0:8000 cart_service.wsgi:application"
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      book-service:
        condition: service_started
    environment:
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: cart_service_db
      DB_USER: bookstore
